name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the v prefix, for example 0.0.1
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Validate release input
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -ne 'refs/heads/main') {
            throw 'Release workflow must run from main.'
          }
          if ('${{ inputs.version }}' -notmatch '^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$') {
            throw 'Version must be semantic, for example 0.0.1.'
          }

      - name: Check out
        uses: actions/checkout@v7.0.0
        with:
          ref: main

      - name: Set up Go
        uses: actions/setup-go@v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 26

      - name: Build and validate
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\dev\scripts\Build-Workspace.ps1 -Version '${{ inputs.version }}' -Strip

      - name: Distribution smoke
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\dev\scripts\Smoke-Distribution.ps1 -Exe .\dist\WindowsUpdaterWebUI.exe

      - name: Generate checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath .\dist\WindowsUpdaterWebUI.exe).Hash.ToLowerInvariant()
          "$hash  WindowsUpdaterWebUI.exe" | Set-Content -LiteralPath .\dist\WindowsUpdaterWebUI.exe.sha256 -Encoding ascii

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ inputs.version }}" `
            .\dist\WindowsUpdaterWebUI.exe `
            .\dist\WindowsUpdaterWebUI.metadata.json `
            .\dist\WindowsUpdaterWebUI.exe.sha256 `
            --target "$env:GITHUB_SHA" `
            --title "WindowsUpdateUtility v${{ inputs.version }}" `
            --notes "CI-built WindowsUpdaterWebUI.exe release."
